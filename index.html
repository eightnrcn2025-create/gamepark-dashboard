<head>
<meta charset="UTF-8">
<title>GamePark 月度数据看板 · 2.15-5.15</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f1419;color:#e6e8eb;min-height:100vh;padding:24px}
  .wrap{max-width:1400px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #2a3441}
  header h1{font-size:24px;font-weight:600;color:#fff}
  header h1 .sub{font-size:13px;color:#7a8b9a;font-weight:normal;margin-left:12px}
  header .meta{font-size:12px;color:#7a8b9a;text-align:right}
  header .meta .legend{margin-top:6px;display:flex;gap:12px;justify-content:flex-end}
  header .meta .legend span{display:inline-flex;align-items:center;gap:6px}
  header .meta .legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

  /* KPI cards */
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .kpi-card{background:#1a2129;border:1px solid #2a3441;border-radius:10px;padding:20px;position:relative;overflow:hidden}
  .kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
  .kpi-card.p1{--c:#5b8def}
  .kpi-card.p2{--c:#16c7a5}
  .kpi-card.p3{--c:#f1a04c}
  .kpi-card h3{font-size:13px;color:#7a8b9a;font-weight:500;margin-bottom:4px}
  .kpi-card .range{font-size:11px;color:#5a6b7a;margin-bottom:16px}
  .kpi-rows{display:flex;flex-direction:column;gap:12px}
  .kpi-row{display:flex;justify-content:space-between;align-items:baseline}
  .kpi-row .label{font-size:12px;color:#8a9aa9}
  .kpi-row .val{font-size:18px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums}
  .kpi-row .delta{font-size:11px;margin-left:8px;padding:1px 6px;border-radius:3px;font-variant-numeric:tabular-nums}
  .kpi-row .delta.up{color:#16c7a5;background:rgba(22,199,165,.1)}
  .kpi-row .delta.dn{color:#f47171;background:rgba(244,113,113,.1)}
  .kpi-row .delta.flat{color:#7a8b9a;background:rgba(122,139,154,.1)}

  /* Tabs / metric selector */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .pills{display:flex;gap:6px;background:#1a2129;border:1px solid #2a3441;border-radius:8px;padding:4px}
  .toolbar .pill{padding:6px 12px;font-size:12px;color:#8a9aa9;border-radius:5px;cursor:pointer;border:none;background:transparent}
  .toolbar .pill.active{background:#2a3441;color:#fff}
  .toolbar .pill:hover:not(.active){color:#e6e8eb}
  .toolbar .title{font-size:14px;color:#aab5c0;margin-right:auto}

  /* Charts */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .chart-row.single{grid-template-columns:1fr}
  .chart-card{background:#1a2129;border:1px solid #2a3441;border-radius:10px;padding:20px}
  .chart-card .head{margin-bottom:12px}
  .chart-card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
  .chart-card .hint{font-size:11px;color:#7a8b9a}
  .chart-card .chart-box{position:relative;height:320px}
  .chart-card.tall .chart-box{height:380px}

  /* Table */
  .table-card{background:#1a2129;border:1px solid #2a3441;border-radius:10px;padding:20px;margin-bottom:24px}
  .table-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .table-card h3{font-size:14px;font-weight:600;color:#fff}
  .table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
  th{position:sticky;top:0;background:#1a2129;text-align:right;padding:8px 10px;font-weight:500;color:#7a8b9a;border-bottom:1px solid #2a3441;white-space:nowrap;font-size:11px}
  th:first-child,td:first-child{text-align:left}
  td{padding:7px 10px;text-align:right;border-bottom:1px solid #232a33;color:#cad3dc;white-space:nowrap}
  tr:hover td{background:#232a33}
  .pgroup{background:#2a3441;color:#fff;font-weight:500}
  .pgroup td{padding:6px 10px;color:#fff}

  /* Tooltip on chart */
  .chartjs-tooltip{background:#0f1419 !important;border:1px solid #2a3441 !important}

  footer{text-align:center;font-size:11px;color:#5a6b7a;margin-top:20px;padding-top:12px;border-top:1px solid #2a3441}
  @media (max-width:900px){
    .kpi-grid{grid-template-columns:1fr}
    .chart-row{grid-template-columns:1fr}
  }
</style>

const METRICS = [
  { key:'order_amount',         label:'营收',          fmt:'money', sum:true },
  { key:'developer_commission', label:'厂商分润',      fmt:'money', sum:true },
  { key:'platform_commission',  label:'平台分润',      fmt:'money', sum:true },
  { key:'income_amount',        label:'有效订单收入',  fmt:'money', sum:true },
  { key:'pv',                   label:'PV',           fmt:'int',   sum:true },
  { key:'uv',                   label:'UV',           fmt:'int',   sum:true },
  { key:'order_count',          label:'订单数',        fmt:'int',   sum:true },
  { key:'order_user_count',     label:'付费用户数',    fmt:'int',   sum:true },
  { key:'register_count',       label:'新增注册',      fmt:'int',   sum:true },
  { key:'active_user_count',    label:'活跃用户',      fmt:'int',   sum:true },
  { key:'charge_amount',        label:'充值额度',      fmt:'money', sum:true },
  { key:'arpu',                 label:'ARPU(均值)',    fmt:'money', sum:false },
  { key:'average_order_value',  label:'客单价(均值)',  fmt:'money', sum:false }
];
const COLORS = ['#5b8def','#16c7a5','#f1a04c'];

function fmt(val, type){
  if(type==='money') return '¥' + Number(val).toLocaleString('zh-CN',{maximumFractionDigits:2, minimumFractionDigits:2});
  if(type==='int')   return Number(val).toLocaleString('zh-CN');
  return val;
}
function delta(cur, prev){
  if(!prev) return {v:0, s:'flat', txt:'—'};
  const d = (cur - prev) / prev * 100;
  if(Math.abs(d) < 0.05) return {v:d, s:'flat', txt:'0%'};
  return { v:d, s: d>0?'up':'dn', txt: (d>0?'+':'') + d.toFixed(1) + '%' };
}

function sumPeriod(p, key){
  const m = METRICS.find(x=>x.key===key);
  if(!m) return 0;
  if(m.sum) return p.days.reduce((a,d)=>a + Number(d[key]||0), 0);
  const vals = p.days.map(d => Number(d[key]||0));
  return vals.reduce((a,v)=>a+v,0) / vals.length;
}

// Precompute totals
const totals = DATA.map(p => {
  const t = {};
  METRICS.forEach(m => t[m.key] = sumPeriod(p, m.key));
  return { id:p.id, label:p.label, totals:t, days:p.days };
});

// === KPI grid ===
const kpiKeys = ['order_amount','developer_commission','platform_commission','pv','uv','order_count','order_user_count'];
const kpiHtml = totals.map((p, i) => {
  const rows = kpiKeys.map(k => {
    const m = METRICS.find(x=>x.key===k);
    const val = p.totals[k];
    let dHtml = '';
    if(i>0){
      const d = delta(val, totals[i-1].totals[k]);
      dHtml = `<span class="delta ${d.s}">${d.txt}</span>`;
    } else {
      dHtml = '<span class="delta flat">—</span>';
    }
    return `<div class="kpi-row"><span class="label">${m.label}</span><span><span class="val">${fmt(val,m.fmt)}</span>${dHtml}</span></div>`;
  }).join('');
  return `<div class="kpi-card p${i+1}">
    <h3>${'P'+(i+1)+' · '+p.label}</h3>
    <div class="range">${p.days.length} 天 · ${p.days[0].date} ~ ${p.days[p.days.length-1].date}</div>
    <div class="kpi-rows">${rows}</div>
  </div>`;
}).join('');
document.getElementById('kpiGrid').innerHTML = kpiHtml;
document.getElementById('ts').textContent = new Date().toLocaleString('zh-CN',{hour12:false});

// === Period comparison chart ===
const cmpKeys = ['order_amount','developer_commission','platform_commission','pv','uv','order_count','order_user_count','register_count'];
function makePills(containerId, keys, onChange){
  const c = document.getElementById(containerId);
  c.innerHTML = keys.map((k,i)=>{
    const m = METRICS.find(x=>x.key===k);
    return `<button class="pill ${i===0?'active':''}" data-k="${k}">${m.label}</button>`;
  }).join('');
  c.querySelectorAll('.pill').forEach(b=>{
    b.onclick = () => {
      c.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      onChange(b.dataset.k);
    };
  });
}

let cmpChart;
function renderCmp(key){
  const m = METRICS.find(x=>x.key===key);
  const vals = totals.map(t => t.totals[key]);
  document.getElementById('cmpTitle').textContent = m.label + ' 对比';
  if(cmpChart) cmpChart.destroy();
  cmpChart = new Chart(document.getElementById('cmpChart'), {
    type:'bar',
    data:{ labels: totals.map((t,i)=>'P'+(i+1)+' '+t.label), datasets:[{
      label: m.label, data: vals, backgroundColor: COLORS, borderRadius:6, maxBarThickness:90
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{
        callbacks:{ label:ctx=> m.label+': '+fmt(ctx.parsed.y, m.fmt) +
          (ctx.dataIndex>0?' (环比 '+delta(ctx.parsed.y, vals[ctx.dataIndex-1]).txt+')':'')
        }
      }},
      scales:{
        x:{ticks:{color:'#7a8b9a'}, grid:{display:false}},
        y:{ticks:{color:'#7a8b9a', callback:v=>m.fmt==='money'?'¥'+v.toLocaleString():v.toLocaleString()}, grid:{color:'#232a33'}}
      }
    }
  });
}
makePills('cmpPills', cmpKeys, renderCmp);
renderCmp('order_amount');

// === Daily trend chart ===
let trendChart;
function renderTrend(key){
  const m = METRICS.find(x=>x.key===key);
  document.getElementById('trendTitle').textContent = '每日 ' + m.label;
  if(trendChart) trendChart.destroy();
  const datasets = totals.map((p, i) => ({
    label: 'P'+(i+1)+' '+p.label,
    data: p.days.map(d=>({x:d.date, y:Number(d[key])})),
    borderColor: COLORS[i],
    backgroundColor: COLORS[i]+'33',
    pointRadius:2, pointHoverRadius:5, borderWidth:2,
    tension:0.25, fill:false
  }));
  trendChart = new Chart(document.getElementById('trendChart'), {
    type:'line',
    data:{ datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'nearest', intersect:false },
      plugins:{
        legend:{ labels:{color:'#aab5c0', boxWidth:12} },
        tooltip:{ callbacks:{ label:ctx => ctx.dataset.label+' '+ctx.label+': '+fmt(ctx.parsed.y, m.fmt) } }
      },
      scales:{
        x:{ type:'category', ticks:{color:'#7a8b9a', maxRotation:0, autoSkip:true, maxTicksLimit:14}, grid:{display:false}},
        y:{ ticks:{color:'#7a8b9a', callback:v=>m.fmt==='money'?'¥'+v.toLocaleString():v.toLocaleString()}, grid:{color:'#232a33'}}
      }
    }
  });
}
makePills('trendPills', cmpKeys, renderTrend);
renderTrend('order_amount');

// === Stacked split chart ===
new Chart(document.getElementById('splitChart'), {

      y:{stacked:true, ticks:{color:'#7a8b9a', callback:v=>'¥'+v.toLocaleString()}, grid:{color:'#232a33'}}
    }
  }
});

// === Ratio donut/bar ===
const ratios = totals.map(t => {
  const total = t.totals.developer_commission + t.totals.platform_commission;
  return total>0 ? t.totals.developer_commission / total * 100 : 0;
});
new Chart(document.getElementById('ratioChart'), {
  type:'bar',
  data:{
    labels: totals.map((t,i)=>'P'+(i+1)+' '+t.label),
    datasets:[{ label:'厂商分润占比', data: ratios, backgroundColor: COLORS, borderRadius:6, maxBarThickness:60 }]
  },
  options:{
    responsive:true, maintainAspectRatio:false, indexAxis:'y',
    plugins:{ legend:{display:false},
      tooltip:{callbacks:{ label:ctx=>'厂商占比: '+ctx.parsed.x.toFixed(1)+'% / 平台占比: '+(100-ctx.parsed.x).toFixed(1)+'%' }}
    },
    scales:{
      x:{ticks:{color:'#7a8b9a', callback:v=>v+'%'}, grid:{color:'#232a33'}, max:100},
      y:{ticks:{color:'#7a8b9a'}, grid:{display:false}}
    }
  }
});

// === Detail table ===
const tableCols = [
  ['date','日期'], ['pv','PV'], ['uv','UV'], ['register_count','新增注册'],
  ['active_user_count','活跃用户'], ['order_count','订单数'], ['order_user_count','付费用户'],
  ['order_amount','营收'], ['income_amount','订单收入'], ['developer_commission','厂商分润'],
  ['platform_commission','平台分润']
];
function renderTable(filter){
  const thead = '<tr>'+tableCols.map(c=>`<th>${c[1]}</th>`).join('')+'</tr>';
  document.querySelector('#detailTable thead').innerHTML = thead;
  let html = '';
  totals.forEach((p, i) => {
    if(filter !== 'all' && filter !== 'P'+(i+1)) return;
    // group row with totals
    html += `<tr class="pgroup"><td>P${i+1} · ${p.label} (合计)</td>` +
      tableCols.slice(1).map(c=>{
        const m = METRICS.find(x=>x.key===c[0]);
        if(!m) return '<td></td>';
        return `<td>${fmt(p.totals[c[0]], m.fmt)}</td>`;
      }).join('') + '</tr>';
    p.days.forEach(d => {
      html += '<tr>' + tableCols.map(c => {
        if(c[0]==='date') return `<td>${d.date}</td>`;
        const m = METRICS.find(x=>x.key===c[0]);
        return `<td>${fmt(d[c[0]]||0, m?m.fmt:'int')}</td>`;
      }).join('') + '</tr>';
    });
  });
  document.querySelector('#detailTable tbody').innerHTML = html;
}
const tp = document.getElementById('tablePills');
tp.innerHTML = ['全部','P1','P2','P3'].map((l,i)=>`<button class="pill ${i===0?'active':''}" data-f="${i===0?'all':l}">${l}</button>`).join('');
tp.querySelectorAll('.pill').forEach(b=>{
  b.onclick = ()=>{ tp.querySelectorAll('.pill').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderTable(b.dataset.f); };
});
renderTable('all');
